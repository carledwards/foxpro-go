<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>foxpro-go in the browser</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #eee;
    font-family: -apple-system, system-ui, sans-serif;
    height: 100%;
  }
  #wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    box-sizing: border-box;
  }
  #status {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  canvas {
    background: #000;
    image-rendering: pixelated;
    outline: none;
    box-shadow: 0 0 0 1px #333;
    /* Scale down to fit the viewport while preserving the cell grid's
       aspect ratio. width/height in JS still set the backing-store
       resolution; CSS just clamps the rendered size. */
    max-width: 100vw;
    max-height: calc(100vh - 60px);
    height: auto;
  }
  canvas:focus { box-shadow: 0 0 0 2px #4a9; }
</style>
</head>
<body>
<div id="wrap">
  <div id="status">loading…</div>
  <canvas id="screen" tabindex="0"></canvas>
</div>
<script src="wasm_exec.js"></script>
<script src="sim.js"></script>
</body>
</html>
